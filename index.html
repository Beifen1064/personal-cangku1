    <div class="app-container">
        <!-- 侧边栏 -->

                    </div>
                    <span class="batch-bar-text" id="batchCountText">已选 0 项</span>
                </div>
                <div class="batch-bar-right">
                    <button class="batch-bar-btn" onclick="cancelBatchMode()">取消</button>
                    <button class="batch-bar-btn danger" onclick="confirmBatchDelete()">删除</button>
                </div>
            </div>
            <button class="new-chat-btn" onclick="newChat()" title="新建对话">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                <span>新建对话</span>
            </button>
            <div class="search-wrap">
                <svg class="search-wrap-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

            </div>
            <div class="chat-list" id="chatList"></div>
            <div class="sidebar-footer">
                <span id="chatCount">暂无对话</span>
                <div class="sidebar-footer-actions">
                    <button class="footer-btn" onclick="expandAllGroups()">展开</button>
                    <button class="footer-btn" onclick="collapseAllGroups()">折叠</button>
                    <button class="footer-btn" onclick="enterBatchMode()">批量</button>
                    <button class="footer-btn danger" onclick="confirmClearAll()">清空</button>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="top-bar">
                <span class="top-bar-label">嵌入地址</span>
                <div class="top-bar-input-wrap">
                    <svg class="top-bar-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" class="top-bar-input" id="urlInput" value="http://10.18.163.126/chatbot/LMpGbkbWfMXlTATt" placeholder="输入 Dify Chatflow 嵌入地址...">
                </div>
                <button class="top-bar-btn" onclick="loadUrl()">加载</button>
                <button class="top-bar-btn secondary" onclick="resetUrl()">重置</button>
                <button class="theme-toggle" onclick="toggleTheme()" title="切换深色模式">
                    <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </button>
            </div>
            <div class="content-area">
                <div class="placeholder" id="placeholder">
                    <div class="placeholder-card">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M8 10h8M8 14h5"/></svg>
                        <h3>AI 智能助手</h3>
                        <p>请输入 Dify Chatflow 嵌入地址开始对话</p>
                    </div>
                </div>
                <iframe id="chatFrame" allow="microphone"></iframe>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-box">
            <div class="confirm-header">
                <span class="confirm-title" id="confirmTitle">确认操作</span>
                <button class="confirm-close" onclick="closeConfirm()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="confirm-body"><p id="confirmMsg">确定要执行此操作吗？</p></div>
            <div class="confirm-footer">
                <button class="btn-cancel" onclick="closeConfirm()">取消</button>
                <button class="btn-danger" id="confirmBtn">确定</button>
            </div>
        </div>
    </div>

    <script>
        var chatHistory = JSON.parse(localStorage.getItem('chatHistory') || '[]');
        var currentChatId = null;
        var loadedUrl = '';
        var toastTimer = null;
        var collapsedGroups = JSON.parse(localStorage.getItem('collapsedGroups') || '{}');
        var batchMode = false;
        var selectedChats = new Set();

        // ===== 主题切换 =====
        function toggleTheme() {
            var html = document.documentElement;
            var current = html.getAttribute('data-theme');
            var next = current === 'dark' ? null : 'dark';
            if (next) html.setAttribute('data-theme', next);
            else html.removeAttribute('data-theme');
            localStorage.setItem('theme', next || 'light');
        }
        (function() {
            var saved = localStorage.getItem('theme');
            if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        })();

        // ===== Toast =====
        function showToast(msg, duration) {
            duration = duration || 2000;
            var el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(function() { el.classList.remove('show'); }, duration);
        }

        // ===== 确认弹窗 =====
        var confirmCallback = null;
        function showConfirm(title, msg, onConfirm) {
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmMsg').textContent = msg;
            confirmCallback = onConfirm;
            document.getElementById('confirmBtn').onclick = function() {
                var cb = confirmCallback;
                closeConfirm();
                if (cb) cb();
            };
            document.getElementById('confirmOverlay').classList.add('show');
        }
        function closeConfirm() {
            document.getElementById('confirmOverlay').classList.remove('show');
            confirmCallback = null;
        }

        // ===== HTML 转义 =====
        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== 持久化 =====
        function saveHistory() { localStorage.setItem('chatHistory', JSON.stringify(chatHistory)); }
        function saveCollapsedGroups() { localStorage.setItem('collapsedGroups', JSON.stringify(collapsedGroups)); }

        // ===== 日期分组工具 =====
        function getDateGroup(timeStr) {
            if (!timeStr) return '未知日期';
            var parts = timeStr.split(' ')[0].split('-');
            var date = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
            var now = new Date();
            var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            var yesterday = new Date(today.getTime() - 86400000);
            var weekAgo = new Date(today.getTime() - 7 * 86400000);

            if (date.getTime() >= today.getTime()) return '今天';
            if (date.getTime() >= yesterday.getTime()) return '昨天';
            if (date.getTime() >= weekAgo.getTime()) return '最近7天';
            if (date.getFullYear() === now.getFullYear()) {
                return date.getFullYear() + '年' + (date.getMonth() + 1) + '月';
            }
            return date.getFullYear() + '年';
        }

        function groupSortKey(groupName) {
            var order = { '今天': 0, '昨天': 1, '最近7天': 2 };
            if (order[groupName] !== undefined) return order[groupName];
            // 解析年月
            var m = groupName.match(/(\d{4})年(\d{1,2})月/);
            if (m) return 100 - parseInt(m[1]) * 100 + (100 - parseInt(m[2]));
            var y = groupName.match(/(\d{4})年/);
            if (y) return 10000 - parseInt(y[1]);
            return 999;
        }

        // ===== 渲染侧边栏列表（分组） =====
        function renderChatList() {
            var list = document.getElementById('chatList');
            var count = document.getElementById('chatCount');
            var keyword = (document.getElementById('searchInput').value || '').trim().toLowerCase();

            var filtered = chatHistory;
            if (keyword) {
                filtered = chatHistory.filter(function(c) {
                    return c.title.toLowerCase().indexOf(keyword) !== -1;
                });
            }

            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state">' +
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
                    '<div>' + (keyword ? '未找到匹配的对话' : '暂无对话记录') + '</div></div>';
                count.textContent = keyword ? '找到 0 条' : '暂无对话';
                return;
            }

            // 分组
            var groups = {};
            filtered.forEach(function(chat) {
                var group = getDateGroup(chat.time);
                if (!groups[group]) groups[group] = [];
                groups[group].push(chat);
            });

            var sortedKeys = Object.keys(groups).sort(function(a, b) {
                return groupSortKey(a) - groupSortKey(b);
            });

            count.textContent = '共 ' + filtered.length + ' 条对话';

            var html = '';
            sortedKeys.forEach(function(groupName) {
                var items = groups[groupName];
                var isCollapsed = !!collapsedGroups[groupName];
                html += '<div class="chat-group-header">' +
                    '<span class="chat-group-label">' + groupName + '</span>' +
                    '<div style="display:flex;align-items:center;gap:6px;">' +
                        '<span class="chat-group-count">' + items.length + '</span>' +
                        '<button class="chat-group-toggle" onclick="toggleGroup(\'' + escapeHtml(groupName) + '\')" title="' + (isCollapsed ? '展开' : '折叠') + '">' +
                            (isCollapsed ? '&#9654;' : '&#9660;') +
                        '</button>' +
                    '</div>' +
                '</div>';
                html += '<div class="chat-group-items' + (isCollapsed ? ' collapsed' : '') + '" data-group="' + escapeHtml(groupName) + '">';
                items.forEach(function(chat) {
                    var isActive = chat.id === currentChatId;
                    var isSelected = selectedChats.has(chat.id);
                    html += '<div class="chat-item' + (isActive ? ' active' : '') + (batchMode ? ' batch-mode' : '') + '" data-id="' + chat.id + '">';
                    if (batchMode) {
                        html += '<div class="batch-checkbox' + (isSelected ? ' checked' : ' unchecked') + '" onclick="event.stopPropagation();toggleSelectChat(\'' + chat.id + '\')">' +
                            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' +
                        '</div>';
                    } else {
                        html += '<div class="chat-item-icon">' +
                            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
                        '</div>';
                    }
                    html += '<div class="chat-item-content" ondblclick="' + (batchMode ? '' : 'startRename(\'' + chat.id + '\')') + '" onclick="' + (batchMode ? '' : 'switchChat(\'' + chat.id + '\')') + '">' +
                            '<div class="chat-item-title">' + escapeHtml(chat.title) + '</div>' +
                            '<div class="chat-item-time">' + chat.time + '</div>' +
                        '</div>';
                    if (!batchMode) {
                        html += '<div class="chat-item-actions">' +
                            '<button class="chat-item-action" onclick="event.stopPropagation();startRename(\'' + chat.id + '\')" title="重命名">' +
                                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>' +
                            '</button>' +
                            '<button class="chat-item-action delete" onclick="event.stopPropagation();deleteChat(\'' + chat.id + '\')" title="删除">' +
                                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>' +
                            '</button>' +
                        '</div>';
                    }
                    html += '</div>';
                });
                html += '</div>';
            });

            list.innerHTML = html;
        }

        // ===== 分组折叠/展开 =====
        function toggleGroup(groupName) {
            collapsedGroups[groupName] = !collapsedGroups[groupName];
            saveCollapsedGroups();
            renderChatList();
        }
        function expandAllGroups() {
            collapsedGroups = {};
            saveCollapsedGroups();
            renderChatList();
            showToast('已展开全部分组');
        }
        function collapseAllGroups() {
            var allGroups = {};
            chatHistory.forEach(function(c) {
                allGroups[getDateGroup(c.time)] = true;
            });
            collapsedGroups = allGroups;
            saveCollapsedGroups();
            renderChatList();
            showToast('已折叠全部分组');
        }

        // ===== 新建对话 =====
        function newChat() {
            var now = new Date();
            var timeStr = now.getFullYear() + '-' +
                String(now.getMonth() + 1).padStart(2, '0') + '-' +
                String(now.getDate()).padStart(2, '0') + ' ' +
                String(now.getHours()).padStart(2, '0') + ':' +
                String(now.getMinutes()).padStart(2, '0');
            var chat = {
                id: 'chat_' + Date.now(),
                title: '对话 ' + (chatHistory.length + 1),
                time: timeStr,
                url: loadedUrl
            };
            chatHistory.unshift(chat);
            currentChatId = chat.id;
            saveHistory();
            // 确保今天分组展开
            delete collapsedGroups['今天'];
            saveCollapsedGroups();
            renderChatList();

            var frame = document.getElementById('chatFrame');
            if (loadedUrl) {
                frame.src = '';
                setTimeout(function() { frame.src = loadedUrl; }, 100);
            }
            showToast('已创建新对话');
        }

        // ===== 切换对话 =====
        function switchChat(id) {
            if (id === currentChatId) return;
            currentChatId = id;
            renderChatList();
            var frame = document.getElementById('chatFrame');
            if (loadedUrl) {
                frame.src = '';
                setTimeout(function() { frame.src = loadedUrl; }, 100);
            }
            showToast('已切换对话');
        }

        // ===== 删除对话 =====
        function deleteChat(id) {
            var chat = chatHistory.find(function(c) { return c.id === id; });
            var title = chat ? chat.title : '此对话';
            showConfirm('删除对话', '确定要删除"' + title + '"吗？此操作不可撤销。', function() {
                chatHistory = chatHistory.filter(function(c) { return c.id !== id; });
                if (currentChatId === id) {
                    currentChatId = chatHistory.length > 0 ? chatHistory[0].id : null;
                }
                saveHistory();
                renderChatList();
                showToast('已删除对话');
            });
        }

        // ===== 重命名对话 =====
        function startRename(id) {
            event.stopPropagation();
            var chat = chatHistory.find(function(c) { return c.id === id; });
            if (!chat) return;
            var item = document.querySelector('.chat-item[data-id="' + id + '"] .chat-item-title');
            if (!item) return;
            var oldTitle = chat.title;
            item.innerHTML = '<input class="rename-input" type="text" value="' + escapeHtml(oldTitle) + '">';
            var input = item.querySelector('input');
            input.focus();
            input.select();
            function finishRename() {
                var newTitle = input.value.trim() || oldTitle;
                chat.title = newTitle;
                saveHistory();
                renderChatList();
                if (newTitle !== oldTitle) showToast('已重命名');
            }
            input.addEventListener('blur', finishRename);
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
                if (e.key === 'Escape') { input.value = oldTitle; input.blur(); }
            });
        }

        // ===== 批量模式 =====
        function enterBatchMode() {
            if (chatHistory.length === 0) { showToast('没有可批量操作的记录'); return; }
            batchMode = true;
            selectedChats.clear();
            updateBatchBar();
            renderChatList();
        }
        function cancelBatchMode() {
            batchMode = false;
            selectedChats.clear();
            updateBatchBar();
            renderChatList();
        }
        function updateBatchBar() {
            var bar = document.getElementById('batchBar');
            if (batchMode) {
                bar.classList.add('show');
                updateSelectAllCheckbox();
                document.getElementById('batchCountText').textContent = '已选 ' + selectedChats.size + ' 项';
            } else {
                bar.classList.remove('show');
            }
        }
        function toggleSelectChat(id) {
            if (selectedChats.has(id)) {
                selectedChats.delete(id);
            } else {
                selectedChats.add(id);
            }
            updateBatchBar();
            renderChatList();
        }
        function toggleSelectAll() {
            var visibleIds = getVisibleChatIds();
            var allSelected = visibleIds.every(function(id) { return selectedChats.has(id); });
            if (allSelected) {
                visibleIds.forEach(function(id) { selectedChats.delete(id); });
            } else {
                visibleIds.forEach(function(id) { selectedChats.add(id); });
            }
            updateBatchBar();
            renderChatList();
        }
        function updateSelectAllCheckbox() {
            var checkbox = document.getElementById('selectAllCheckbox');
            var visibleIds = getVisibleChatIds();
            var allSelected = visibleIds.length > 0 && visibleIds.every(function(id) { return selectedChats.has(id); });
            var someSelected = visibleIds.some(function(id) { return selectedChats.has(id); });
            if (allSelected) {
                checkbox.classList.add('checked');
                checkbox.classList.remove('unchecked');
            } else if (someSelected) {
                checkbox.classList.remove('checked');
                checkbox.classList.remove('unchecked');
                checkbox.style.background = 'var(--accent)';
                checkbox.style.opacity = '0.5';
            } else {
                checkbox.classList.remove('checked');
                checkbox.classList.add('unchecked');
                checkbox.style.background = '';
                checkbox.style.opacity = '';
            }
        }
        function getVisibleChatIds() {
            var keyword = (document.getElementById('searchInput').value || '').trim().toLowerCase();
            var filtered = chatHistory;
            if (keyword) {
                filtered = chatHistory.filter(function(c) {
                    return c.title.toLowerCase().indexOf(keyword) !== -1;
                });
            }
            return filtered.map(function(c) { return c.id; });
        }
        function confirmBatchDelete() {
            if (selectedChats.size === 0) { showToast('请先选择要删除的对话'); return; }
            showConfirm('批量删除', '确定要删除选中的 ' + selectedChats.size + ' 条对话吗？此操作不可撤销。', function() {
                chatHistory = chatHistory.filter(function(c) { return !selectedChats.has(c.id); });
                if (selectedChats.has(currentChatId)) {
                    currentChatId = chatHistory.length > 0 ? chatHistory[0].id : null;
                }
                selectedChats.clear();
                saveHistory();
                renderChatList();
                showToast('已删除 ' + selectedChats.size + ' 条对话');
                if (chatHistory.length === 0) cancelBatchMode();
            });
        }

        // ===== 清空全部 =====
        function confirmClearAll() {
            if (chatHistory.length === 0) { showToast('没有可清空的记录'); return; }
            showConfirm('清空全部对话', '确定要删除全部 ' + chatHistory.length + ' 条对话记录吗？此操作不可撤销。', function() {
                chatHistory = [];
                currentChatId = null;
                saveHistory();
                renderChatList();
                showToast('已清空全部对话');
                if (batchMode) cancelBatchMode();
            });
        }

        // ===== 侧边栏折叠 =====
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        // ===== 加载嵌入地址 =====
        function loadUrl() {
            var url = document.getElementById('urlInput').value.trim();
            if (!url) return;
            loadedUrl = url;
            document.getElementById('placeholder').style.display = 'none';
            var frame = document.getElementById('chatFrame');
            frame.style.display = 'block';
            frame.src = url;
            if (!currentChatId) {
                var now = new Date();
                var timeStr = now.getFullYear() + '-' +
                    String(now.getMonth() + 1).padStart(2, '0') + '-' +
                    String(now.getDate()).padStart(2, '0') + ' ' +
                    String(now.getHours()).padStart(2, '0') + ':' +
                    String(now.getMinutes()).padStart(2, '0');
                var chat = { id: 'chat_' + Date.now(), title: '对话 1', time: timeStr, url: url };
                chatHistory.unshift(chat);
                currentChatId = chat.id;
                saveHistory();
                renderChatList();
            }
        }

        // ===== 重置 =====
        function resetUrl() {
            document.getElementById('urlInput').value = '';
            loadedUrl = '';
            document.getElementById('chatFrame').style.display = 'none';
            document.getElementById('chatFrame').src = '';
            document.getElementById('placeholder').style.display = 'flex';
        }

        // ===== 键盘快捷键 =====
        document.getElementById('urlInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') loadUrl();
        });

        // ===== 初始化 =====
        renderChatList();
    </script>
</body>
</html>
