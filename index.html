<!-- Generated by Trae Work -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能助手</title>
    <style>
        :root {
            --bg: #202020;
            --bg2: #272727;
            --bg3: #323232;
            --bg4: #3a3a3a;
            --ink: #ffffff;
            --muted: #a0a0a0;
            --rule: #3c3c3c;
            --accent: #60cdff;
            --accent2: #4db8eb;
            --hover: rgba(255,255,255,0.06);
            --active: rgba(96,205,255,0.12);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; font-family: "Segoe UI Variable", "Segoe UI", sans-serif; background: var(--bg); color: var(--ink); }
        body { display: flex; flex-direction: column; }

        /* 输入栏 */
        .input-bar {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 20px;
            background: var(--bg2);
            border-bottom: 1px solid var(--rule);
            flex-shrink: 0;
        }
        .input-bar label { font-size: 0.85rem; color: var(--muted); white-space: nowrap; font-weight: 500; }
        .input-bar input {
            flex: 1; padding: 8px 14px; background: var(--bg3);
            border: 1px solid var(--rule); border-radius: 4px;
            font-size: 0.85rem; color: var(--ink); outline: none;
            font-family: "Segoe UI Variable", "Segoe UI", sans-serif;
        }
        .input-bar input:focus { border-color: var(--accent); }
        .input-bar input::placeholder { color: var(--muted); }
        .input-bar button {
            padding: 8px 20px; background: var(--accent); color: #000;
            border: none; border-radius: 4px; font-size: 0.85rem;
            cursor: pointer; white-space: nowrap; font-weight: 600;
            transition: background 0.15s;
        }
        .input-bar button:hover { background: var(--accent2); }
        .input-bar button.reset { background: var(--bg3); color: var(--ink); font-weight: 500; }
        .input-bar button.reset:hover { background: var(--bg4); }

        /* 主区域 */
        .main-area { display: flex; flex: 1; overflow: hidden; }

        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background: var(--bg2);
            border-right: 1px solid var(--rule);
            display: flex; flex-direction: column;
            flex-shrink: 0;
            transition: margin-left 0.25s ease;
        }
        .sidebar.collapsed { margin-left: -280px; }
        .sidebar-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px;
        }
        .sidebar-header h3 { font-size: 0.9rem; color: var(--ink); font-weight: 600; letter-spacing: 0.02em; }
        .sidebar-header button {
            background: none; border: none; cursor: pointer;
            color: var(--muted); padding: 4px; font-size: 1rem; line-height: 1;
            border-radius: 4px; transition: all 0.15s;
        }
        .sidebar-header button:hover { color: var(--ink); background: var(--hover); }
        .new-chat-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin: 0 16px 12px; padding: 10px;
            background: var(--bg3); border: 1px solid var(--rule);
            border-radius: 4px; color: var(--ink);
            font-size: 0.85rem; cursor: pointer; transition: all 0.15s;
            font-weight: 500;
        }
        .new-chat-btn:hover { background: var(--bg4); border-color: var(--accent); }
        .new-chat-btn svg { color: var(--accent); }
        .chat-list { flex: 1; overflow-y: auto; padding: 4px 12px; }
        .chat-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 14px; border-radius: 4px;
            cursor: pointer; transition: all 0.12s;
            margin-bottom: 2px;
        }
        .chat-item:hover { background: var(--hover); }
        .chat-item.active { background: var(--active); }
        .chat-item.active .chat-item-title { color: var(--accent); }
        .chat-item-content { flex: 1; min-width: 0; }
        .chat-item-title { font-size: 0.85rem; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 400; }
        .chat-item-time { font-size: 0.7rem; color: var(--muted); margin-top: 3px; }
        .chat-item-delete {
            background: none; border: none; cursor: pointer;
            color: var(--muted); padding: 4px; font-size: 0.8rem;
            line-height: 1; opacity: 0; transition: all 0.12s;
            border-radius: 4px;
        }
        .chat-item:hover .chat-item-delete { opacity: 1; }
        .chat-item-delete:hover { color: #ff6b6b; background: rgba(255,107,107,0.1); }
        .sidebar-footer {
            padding: 12px 20px;
            font-size: 0.75rem; color: var(--muted); text-align: center;
        }

        /* 切换按钮 */
        .toggle-sidebar {
            position: absolute; left: 280px; top: 50%;
            transform: translateY(-50%);
            background: var(--bg2); border: 1px solid var(--rule);
            border-left: none; border-radius: 0 4px 4px 0;
            padding: 10px 4px; cursor: pointer;
            color: var(--muted); font-size: 0.75rem; z-index: 10;
            transition: left 0.25s ease; line-height: 1;
        }
        .toggle-sidebar:hover { color: var(--accent); background: var(--bg3); }
        .toggle-sidebar.shifted { left: 0; }

        /* 内容区 */
        .content-area {
            flex: 1; position: relative;
            display: flex; flex-direction: column;
            background: var(--bg);
        }
        .placeholder {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            flex: 1; color: var(--muted);
        }
        .placeholder svg { margin-bottom: 16px; }
        .placeholder p { font-size: 0.95rem; }
        iframe { flex: 1; width: 100%; border: none; display: none; }
    </style>
</head>
<body>
    <div class="input-bar" id="inputBar">
        <label>嵌入地址：</label>
        <input type="text" id="urlInput" value="http://127.0.0.1/chatbot/LMpGbkbWfMXlTATt" placeholder="输入 Dify Chatflow 嵌入地址">
        <button onclick="loadUrl()">加载</button>
        <button class="reset" onclick="resetUrl()">重置</button>
    </div>

    <div class="main-area" id="mainArea">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>聊天历史</h3>
                <button onclick="toggleSidebar()" title="收起侧边栏">◀</button>
            </div>
            <div class="new-chat-btn" onclick="newChat()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                新建对话
            </div>
            <div class="chat-list" id="chatList"></div>
            <div class="sidebar-footer" id="chatCount">暂无对话记录</div>
        </aside>

        <button class="toggle-sidebar" id="toggleBtn" onclick="toggleSidebar()">▶</button>

        <div class="content-area">
            <div class="placeholder" id="placeholder">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5">
                    <rect x="2" y="3" width="20" height="18" rx="2"/>
                    <path d="M8 10h8M8 14h5"/>
                </svg>
                <p>请输入 Dify Chatflow 嵌入地址</p>
            </div>
            <iframe id="chatFrame" allow="microphone"></iframe>
        </div>
    </div>

    <script>
        var chatHistory = JSON.parse(localStorage.getItem('chatHistory') || '[]');
        var currentChatId = null;

        function renderChatList() {
            var list = document.getElementById('chatList');
            var count = document.getElementById('chatCount');
            if (chatHistory.length === 0) {
                list.innerHTML = '';
                count.textContent = '暂无对话记录';
                return;
            }
            count.textContent = '共 ' + chatHistory.length + ' 条对话';
            list.innerHTML = chatHistory.map(function(chat) {
                return '<div class="chat-item' + (chat.id === currentChatId ? ' active' : '') + '" onclick="switchChat(\'' + chat.id + '\')">' +
                    '<div class="chat-item-content">' +
                        '<div class="chat-item-title">' + escapeHtml(chat.title) + '</div>' +
                        '<div class="chat-item-time">' + chat.time + '</div>' +
                    '</div>' +
                    '<button class="chat-item-delete" onclick="event.stopPropagation();deleteChat(\'' + chat.id + '\')" title="删除">✕</button>' +
                '</div>';
            }).join('');
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function saveHistory() {
            localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
        }

        function newChat() {
            var now = new Date();
            var timeStr = now.getFullYear() + '-' +
                String(now.getMonth() + 1).padStart(2, '0') + '-' +
                String(now.getDate()).padStart(2, '0') + ' ' +
                String(now.getHours()).padStart(2, '0') + ':' +
                String(now.getMinutes()).padStart(2, '0');
            var chat = {
                id: 'chat_' + Date.now(),
                title: '新对话 ' + (chatHistory.length + 1),
                time: timeStr
            };
            chatHistory.unshift(chat);
            currentChatId = chat.id;
            saveHistory();
            renderChatList();
        }

        function switchChat(id) {
            currentChatId = id;
            renderChatList();
        }

        function deleteChat(id) {
            chatHistory = chatHistory.filter(function(c) { return c.id !== id; });
            if (currentChatId === id) currentChatId = chatHistory.length > 0 ? chatHistory[0].id : null;
            saveHistory();
            renderChatList();
        }

        function toggleSidebar() {
            var sidebar = document.getElementById('sidebar');
            var btn = document.getElementById('toggleBtn');
            sidebar.classList.toggle('collapsed');
            btn.classList.toggle('shifted');
            btn.textContent = sidebar.classList.contains('collapsed') ? '▶' : '◀';
        }

        function loadUrl() {
            var url = document.getElementById('urlInput').value.trim();
            if (!url) return;
            document.getElementById('inputBar').style.display = 'none';
            document.getElementById('placeholder').style.display = 'none';
            var frame = document.getElementById('chatFrame');
            frame.style.display = 'block';
            frame.src = url;
            if (!currentChatId) newChat();
        }

        function resetUrl() {
            document.getElementById('urlInput').value = '';
            document.getElementById('chatFrame').style.display = 'none';
            document.getElementById('chatFrame').src = '';
            document.getElementById('placeholder').style.display = 'flex';
            document.getElementById('inputBar').style.display = 'flex';
        }

        document.getElementById('urlInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') loadUrl();
        });

        renderChatList();
    </script>
</body>
</html>
