<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dify 智能助手</title>
<style>
  /* ===== WinUI 3 / Fluent Design System ===== */
  :root {
    --bg-base: #202020;
    --bg-layer: #2c2c2c;
    --bg-card: #323232;
    --bg-card-hover: #3a3a3a;
    --bg-input: #1a1a1a;
    --bg-sidebar: #282828;
    --bg-sidebar-hover: #353535;
    --bg-sidebar-active: #3d3d3d;

    --accent: #60cdff;
    --accent-hover: #7dd6ff;
    --accent-pressed: #4cc2f0;
    --accent-bg: rgba(96, 205, 255, 0.08);
    --accent-bg-hover: rgba(96, 205, 255, 0.12);

    --text-primary: #ffffff;
    --text-secondary: #9d9d9d;
    --text-tertiary: #6d6d6d;
    --text-on-accent: #000000;

    --border-card: rgba(255,255,255,0.06);
    --border-input: rgba(255,255,255,0.08);
    --border-input-focus: var(--accent);

    --shadow-dialog: 0 8px 32px rgba(0,0,0,0.36), 0 0 0 1px rgba(255,255,255,0.05);
    --shadow-flyout: 0 4px 16px rgba(0,0,0,0.24), 0 0 0 1px rgba(255,255,255,0.05);

    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ===== Chat Header ===== */
  .chat-header {
    height: 48px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    border-bottom: 1px solid var(--border-card);
    flex-shrink: 0;
  }
  .chat-header-title {
    font-size: 14px;
    font-weight: 600;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .chat-header-status {
    font-size: 11px;
    color: var(--text-tertiary);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4caf50;
  }
  .status-dot.disconnected { background: #f44336; }

  .header-btn {
    width: 32px; height: 32px;
    border-radius: var(--radius-sm);
    border: none;
    background: none;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: background 0.12s;
  }
  .header-btn:hover { background: rgba(255,255,255,0.06); }

  /* ===== Iframe Container ===== */
  .iframe-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .iframe-container iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* ===== Welcome / No Config ===== */
  .welcome-screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
    background: var(--bg-base);
    z-index: 10;
  }
  .welcome-screen.hidden { display: none; }

  .welcome-icon {
    width: 64px; height: 64px;
    background: var(--accent-bg);
    border-radius: var(--radius-xl);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
  }
  .welcome-icon svg { width: 32px; height: 32px; fill: var(--accent); }
  .welcome-title {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .welcome-subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    max-width: 400px;
    line-height: 1.5;
    margin-bottom: 24px;
  }
  .welcome-btn {
    padding: 8px 24px;
    border-radius: var(--radius-md);
    border: none;
    background: var(--accent);
    color: var(--text-on-accent);
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.12s;
  }
  .welcome-btn:hover { background: var(--accent-hover); }

  /* ===== Settings Dialog ===== */
  .dialog-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    animation: fadeIn 0.15s ease;
  }
  .dialog-overlay.open { display: flex; }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .dialog {
    background: var(--bg-layer);
    border: 1px solid var(--border-card);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-dialog);
    width: 520px;
    max-width: 90vw;
    animation: dialogIn 0.2s ease;
  }
  @keyframes dialogIn {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .dialog-header {
    padding: 20px 24px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .dialog-title {
    font-size: 16px;
    font-weight: 600;
  }
  .dialog-close {
    width: 32px; height: 32px;
    border-radius: var(--radius-sm);
    border: none;
    background: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s;
  }
  .dialog-close:hover { background: rgba(255,255,255,0.06); }

  .dialog-body {
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .form-group input, .form-group textarea {
    width: 100%;
    padding: 8px 12px;
    background: var(--bg-input);
    border: 1px solid var(--border-input);
    border-radius: var(--radius-md);
    color: var(--text-primary);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group textarea:focus {
    border-color: var(--accent);
  }
  .form-group input::placeholder, .form-group textarea::placeholder {
    color: var(--text-tertiary);
  }
  .form-group textarea {
    resize: vertical;
    min-height: 80px;
    font-family: 'Cascadia Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.5;
  }
  .form-hint {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 4px;
  }

  .dialog-footer {
    padding: 12px 24px 20px;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .btn-primary {
    padding: 7px 20px;
    border-radius: var(--radius-md);
    border: none;
    background: var(--accent);
    color: var(--text-on-accent);
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.12s;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary {
    padding: 7px 20px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-card);
    background: var(--bg-card);
    color: var(--text-primary);
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.12s;
  }
  .btn-secondary:hover { background: var(--bg-card-hover); }

  /* ===== Toast ===== */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 2000;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .toast {
    background: var(--bg-card);
    border: 1px solid var(--border-card);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-flyout);
    padding: 12px 16px;
    font-size: 13px;
    color: var(--text-primary);
    animation: toastIn 0.2s ease, toastOut 0.2s ease 2.8s forwards;
    max-width: 320px;
  }
  .toast.error { border-left: 3px solid #f44336; }
  .toast.success { border-left: 3px solid #4caf50; }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes toastOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }

  /* ===== Loading bar ===== */
  .loading-bar {
    position: absolute;
    top: 0; left: 0;
    height: 2px;
    background: var(--accent);
    z-index: 5;
    transition: width 0.3s ease;
    border-radius: 0 1px 1px 0;
  }

  /* ===== Responsive ===== */
  @media (max-width: 768px) {
    .chat-header { padding: 0 12px; }
    .chat-header-title { font-size: 13px; }
    .welcome-title { font-size: 18px; }
    .welcome-subtitle { font-size: 13px; padding: 0 20px; }
    .welcome-icon { width: 48px; height: 48px; }
    .welcome-icon svg { width: 24px; height: 24px; }
  }
</style>
</head>
<body>

<!-- Chat Header -->
<div class="chat-header">
  <span class="chat-header-title">Dify 智能助手</span>
  <div class="chat-header-status">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">就绪</span>
  </div>
  <button class="header-btn" id="refreshBtn" title="刷新">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M13.451 5.608l-1.069-.163.532-2.014a.5.5 0 00-.967-.256L11.35 5.33a.5.5 0 00.408.627l1.069.163-.532 2.014a.5.5 0 00.967.256l.589-2.255a.5.5 0 00-.408-.627zM4.6 5.33l-.589 2.255a.5.5 0 01-.408.627l-1.069.163.532 2.014a.5.5 0 00.967-.256L5.65 7.87a.5.5 0 00-.408-.627l-1.069-.163.532-2.014a.5.5 0 00-.967-.256zM8 2a6 6 0 100 12A6 6 0 008 2zm0 11a5 5 0 110-10 5 5 0 010 10z"/></svg>
  </button>
  <button class="header-btn" id="settingsBtn" title="设置">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 4a.75.75 0 01.75.75V7.25h2.5a.75.75 0 010 1.5h-2.5v2.5a.75.75 0 01-1.5 0v-2.5h-2.5a.75.75 0 010-1.5h2.5V4.75A.75.75 0 018 4zm0-2a2 2 0 00-2 2v.268A5.502 5.502 0 002.268 8H2a2 2 0 000 4h.268A5.502 5.502 0 006 13.732V14a2 2 0 004 0v-.268A5.502 5.502 0 0013.732 12H14a2 2 0 000-4h-.268A5.502 5.502 0 0010 4.268V4a2 2 0 00-2-2z"/></svg>
  </button>
</div>

<!-- Iframe Container -->
<div class="iframe-container" id="iframeContainer">
  <div class="loading-bar" id="loadingBar" style="width: 0%"></div>
  <iframe id="chatIframe" style="display:none" allow="microphone"></iframe>

  <!-- Welcome / No Config Screen -->
  <div class="welcome-screen" id="welcomeScreen">
    <div class="welcome-icon">
      <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
    </div>
    <div class="welcome-title">Dify 智能助手</div>
    <div class="welcome-subtitle">配置 Dify Chatbot 的嵌入地址后即可开始对话</div>
    <button class="welcome-btn" id="openSettingsBtn">打开设置</button>
  </div>
</div>

<!-- Settings Dialog -->
<div class="dialog-overlay" id="settingsDialog">
  <div class="dialog">
    <div class="dialog-header">
      <span class="dialog-title">设置</span>
      <button class="dialog-close" id="closeSettings">✕</button>
    </div>
    <div class="dialog-body">
      <div class="form-group">
        <label>Chatbot 嵌入地址</label>
        <textarea id="iframeUrlInput" placeholder="http://127.0.0.1/chatbot/xxxxxxxx"></textarea>
        <div class="form-hint">在 Dify 应用的「嵌入到网站」页面获取完整 iframe 代码，填入 src 地址</div>
      </div>
      <div class="form-group">
        <label>页面标题（可选）</label>
        <input type="text" id="pageTitleInput" placeholder="Dify 智能助手" />
        <div class="form-hint">自定义浏览器标签页和顶栏显示的标题</div>
      </div>
    </div>
    <div class="dialog-footer">
      <button class="btn-secondary" id="cancelSettings">取消</button>
      <button class="btn-primary" id="saveSettings">保存并加载</button>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ===== State =====
const DEFAULT_IFRAME_URL = 'http://127.0.0.1/chatbot/V9bEGGveWDtLtpkp';
const DEFAULT_TITLE = 'Dify 智能助手';

const state = {
  iframeUrl: localStorage.getItem('dify_iframe_url') || DEFAULT_IFRAME_URL,
  pageTitle: localStorage.getItem('dify_page_title') || DEFAULT_TITLE,
};

// ===== DOM Elements =====
const $ = id => document.getElementById(id);
const chatIframe = $('chatIframe');
const welcomeScreen = $('welcomeScreen');
const loadingBar = $('loadingBar');
const statusDot = $('statusDot');
const statusText = $('statusText');
const settingsDialog = $('settingsDialog');
const toastContainer = $('toastContainer');

// ===== Toast =====
function showToast(msg, type = 'info') {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  toastContainer.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ===== Load Chatbot =====
function loadChatbot() {
  if (!state.iframeUrl) {
    welcomeScreen.classList.remove('hidden');
    chatIframe.style.display = 'none';
    return;
  }

  welcomeScreen.classList.add('hidden');
  chatIframe.style.display = 'block';

  // Loading animation
  statusDot.className = 'status-dot disconnected';
  statusText.textContent = '加载中...';
  let progress = 0;
  loadingBar.style.width = '0%';
  loadingBar.style.display = 'block';

  const interval = setInterval(() => {
    progress += Math.random() * 15;
    if (progress > 90) progress = 90;
    loadingBar.style.width = progress + '%';
  }, 200);

  chatIframe.onload = () => {
    clearInterval(interval);
    loadingBar.style.width = '100%';
    setTimeout(() => {
      loadingBar.style.display = 'none';
    }, 300);
    statusDot.className = 'status-dot';
    statusText.textContent = '已连接';
  };

  chatIframe.onerror = () => {
    clearInterval(interval);
    loadingBar.style.display = 'none';
    statusDot.className = 'status-dot disconnected';
    statusText.textContent = '连接失败';
    showToast('无法加载 Chatbot，请检查地址是否正确', 'error');
  };

  chatIframe.src = state.iframeUrl;
}

// ===== Settings =====
function openSettings() {
  $('iframeUrlInput').value = state.iframeUrl;
  $('pageTitleInput').value = state.pageTitle;
  settingsDialog.classList.add('open');
}

function closeSettingsDialog() {
  settingsDialog.classList.remove('open');
}

function saveSettings() {
  state.iframeUrl = $('iframeUrlInput').value.trim();
  state.pageTitle = $('pageTitleInput').value.trim() || DEFAULT_TITLE;

  localStorage.setItem('dify_iframe_url', state.iframeUrl);
  localStorage.setItem('dify_page_title', state.pageTitle);

  // Update title
  document.title = state.pageTitle;
  document.querySelector('.chat-header-title').textContent = state.pageTitle;

  closeSettingsDialog();
  showToast('设置已保存', 'success');
  loadChatbot();
}

// ===== Event Listeners =====
$('settingsBtn').addEventListener('click', openSettings);
$('openSettingsBtn').addEventListener('click', openSettings);
$('closeSettings').addEventListener('click', closeSettingsDialog);
$('cancelSettings').addEventListener('click', closeSettingsDialog);
$('saveSettings').addEventListener('click', saveSettings);

settingsDialog.addEventListener('click', (e) => {
  if (e.target === settingsDialog) closeSettingsDialog();
});

$('refreshBtn').addEventListener('click', () => {
  loadChatbot();
  showToast('正在刷新...', 'success');
});

// ===== Init =====
document.title = state.pageTitle;
document.querySelector('.chat-header-title').textContent = state.pageTitle;
loadChatbot();
</script>
</body>
</html>
